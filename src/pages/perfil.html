<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
    <link rel="icon" type="image/png" href="../../src/assets/Careplus_logo.png">
    <title>Care Plus</title>
</head>
<body>
    <header>
        <nav>
            <img src="../../src/assets/Careplus_logo.png" alt="Logo Care Plus" id="logo_careplus">
            <ul>
                <li><a href="../../index.html">Início</a></li>
                <li><a href="../../src/pages/missoes.html">Missões</a></li>
                <li><a href="../../src/pages/recompensas.html">Recompensas</a></li>
                <li><a href="../../src/pages/perfil.html" class="active">Perfil</a></li>
                <li><a href="../../src/pages/login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <main class="container mt-5">
        <div class="row justify-content-center">
            <section class="col-12 col-md-10 col-lg-9"> <div class="card p-4 shadow-sm border-0" style="background-color: #93CB52; border-radius: 20px;">
                    <div class="card-body text-white">
                        
                        <div class="row align-items-center mb-4">
                            <div class="col-12 col-md-4 text-center order-md-2 mb-3 mb-md-0">
                                <img src="../../src/assets/foto_perfil.jpg" alt="Foto de Perfil de Marina" class="rounded-circle mb-2" style="width: 200px; height: 200px; object-fit: cover; border: 3px solid white;">
                                <p class="small text-decoration-underline" style="cursor: pointer;">Alterar foto de perfil</p>
                            </div>

                            <div class="col-12 col-md-8 order-md-1">
                                
                                <div class="mb-4">
                                    <label class="fw-bold mb-1 display-block">Nome:</label>
                                    <div class="perfil-dado-fixo rounded-pill px-3 py-2 bg-white-50 text-dark">
                                        Marina Silva Santos
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-4 mb-3">
                                        <label class="fw-bold mb-1 display-block">Peso:</label>
                                        <div class="perfil-dado-fixo rounded-pill px-3 py-2 bg-white-50 text-dark text-center">
                                            65 kg
                                        </div>
                                    </div>
                                    <div class="col-4 mb-3">
                                        <label class="fw-bold mb-1 display-block">Altura:</label>
                                        <div class="perfil-dado-fixo rounded-pill px-3 py-2 bg-white-50 text-dark text-center">
                                            1.70 m
                                        </div>
                                    </div>
                                    <div class="col-4 mb-3">
                                        <label class="fw-bold mb-1 display-block">Idade:</label>
                                        <div class="perfil-dado-fixo rounded-pill px-3 py-2 bg-white-50 text-dark text-center">
                                            50 anos
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="fw-bold mb-1 display-block">Data de nascimento:</label>
                                <div class="perfil-dado-fixo rounded-pill px-3 py-2 bg-white-50 text-dark">
                                    15/07/1975
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="fw-bold mb-1 display-block">Possui alguma deficiência:</label>
                                <div class="perfil-dado-fixo rounded-pill px-3 py-2 bg-white-50 text-dark">
                                    Não informado
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
