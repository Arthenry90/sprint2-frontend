<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Care Plus</title>
</head>

<body>
    <header>
        <nav>
            <img src="src/assets/Careplus_logo.png" alt="Logo Care Plus" id="logo_careplus">
            <ul>
                <li><a href="index.html" class="active">Início</a></li>
                <li><a href="#">Missões</a></li>
                <li><a href="#">Recompensas</a></li>
                <li><a href="#">Perfil</a></li>
                <li><a href="src/pages/login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <main class="container mt-4">
        <div class="row">
            <section class="col-md-6" id="progresso">
                <div class="card p-4 shadow-sm h-100">
                    <h2 class="h4 mb-4">Progresso</h2>

                    <div class="d-flex align-items-center mb-4">    
                        <div class="circulo-progresso d-flex align-items-center justify-content-center">
                            75%
                        </div>
                        <div class="ms-3">
                            <p class="mb-0 text-muted">Descrição sobre a métrica</p>
                            <hr class="my-1">
                        </div>
                    </div>

                    <div class="missoes mb-4">
                        <h3 class="h6">Missões não iniciadas</h3>
                        <div class="d-flex flex-wrap gap-2">
                            <button class="btn btn-primary btn-sm">Correr 2km</button>
                            <button class="btn btn-primary btn-sm">Correr 2km</button>
                            <button class="btn btn-primary btn-sm">Correr 2km</button>
                            <button class="btn btn-primary btn-sm">Correr 2km</button>
                            <button class="btn btn-primary btn-sm">Correr 2km</button>
                            <button class="btn btn-primary btn-sm">Correr 2km</button>
                        </div>
                    </div>

                    <div class="grafico border p-3 rounded bg-light text-center">
                        <h4 class="h6">Título do gráfico</h4>
                        <p class="small text-muted">(Espaço para gráfico)</p>
                    </div>
                </div>
            </section>
            <div class="col-md-6">
                <div class="row mb-4">
                    <section class="col-12" id="mascote">
                        <div class="card p-4 shadow-sm d-flex align-items-center justify-content-center">
                            <figure class="m-0 text-center">
                                <img src="src/assets/MASCOTE CARE PLUS.png" alt="Mascote Careplus" class="img-fluid" style="max-height: 250px;">
                            </figure>
                        </div>
                    </section>
                </div>
                <div class="row">
                    <section class="col-12" id="usuario-status">
                        <div class="card p-4 shadow-sm">
                            <h3 class="h4 mb-4">Status</h3>
                            
                            <div class="row">
                                <div class="col-6 mb-3"><label>SAÚDE</label><div class="progress"><div class="progress-bar" style="width: 60%"></div></div></div>
                                <div class="col-6 mb-3"><label>RESISTÊNCIA</label><div class="progress"><div class="progress-bar" style="width: 40%"></div></div></div>
                                <div class="col-6 mb-3"><label>FORÇA</label><div class="progress"><div class="progress-bar" style="width: 50%"></div></div></div>
                                <div class="col-6 mb-3"><label>AGILIDADE</label><div class="progress"><div class="progress-bar" style="width: 80%"></div></div></div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
